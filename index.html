<script>
function apiURL(type){
  const chat = document.getElementById('chat')?.value || "";
  const ai = document.getElementById('ai')?.value || "";
  const tq = document.getElementById('teachQ')?.value || "";
  const ta = document.getElementById('teachA')?.value || "";

  if(type==='chat')
    return `https://rakib-api.vercel.app/api/simma-chat?text=${encodeURIComponent(chat)}&apikey=rakib69`;

  if(type==='ai')
    return `https://rakib-api.vercel.app/api/simma-ai?text=${encodeURIComponent(ai)}&apikey=rakib69`;

  if(type==='teach')
    return `https://rakib-api.vercel.app/api/simma-teach?teach=${encodeURIComponent(tq)}&reply=${encodeURIComponent(ta)}&apikey=rakib69`;

  if(type==='prayer')
    return `https://rakib-prayer-time.onrender.com/api/ramadan?location=dhaka&apikey=rakib69`;
}


async function run(type){
  const box = document.getElementById(type + 'Res');

  if(!box){
    alert("Result box missing!");
    return;
  }

  const url = apiURL(type);

  if(!url){
    box.innerText = "❌ Invalid API";
    return;
  }

  // 🔄 loading UI
  box.innerText = "⏳ Loading...";

  try{
    const proxy = "/api/proxy?url=" + encodeURIComponent(url);

    const res = await fetch(proxy);

    if(!res.ok){
      box.innerText = "❌ API Error: " + res.status;
      return;
    }

    const contentType = res.headers.get("content-type") || "";

    if(contentType.includes("application/json")){
      const data = await res.json();
      box.innerText = JSON.stringify(data, null, 2);
    } else {
      const text = await res.text();
      box.innerText = text;
    }

  }catch(e){
    console.error(e);
    box.innerText = "❌ Proxy / Network Error";
  }
}


function copyURL(type){
  const url = apiURL(type);
  navigator.clipboard.writeText(url);
  alert("✅ Copied API URL");
}


function toggleAPI(){
  const folder = document.getElementById('apiFolder');

  folder.classList.toggle('hidden');

  // 👇 button text change (cool effect)
  const btn = event.target;
  btn.innerText = folder.classList.contains('hidden')
    ? "📁 Open API Folder"
    : "📂 Close API Folder";
}


// particles safe init
if(window.particlesJS){
  particlesJS('particles-js', {
    particles:{number:{value:80},size:{value:3},move:{speed:2}}
  });
}
</script>
