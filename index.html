<!-- ===== index.html (UPDATED WITH FIX + TEACH + FOLDER VIEW) ===== --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakib Ultra Pro API</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<style>
body {background:#020617;overflow-x:hidden}
#particles-js{position:fixed;width:100%;height:100%;z-index:-1}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px)}
</style>
</head>
<body>
<div id="particles-js"></div><div class="text-center p-6 text-white">
<h1 class="text-4xl font-bold">Rakib API Panel</h1>
</div><div class="max-w-6xl mx-auto p-4 grid md:grid-cols-2 gap-6 text-white"><div class="glass p-5 rounded-xl">
<h3>Chat API</h3>
<input id="chat" class="w-full p-2 bg-black mt-2 rounded" placeholder="text">
<button onclick="run('chat')" class="mt-2 bg-blue-600 px-4 py-2 rounded">Run</button>
<button onclick="copyURL('chat')" class="mt-2 bg-gray-600 px-4 py-2 rounded">Copy URL</button>
<pre id="chatRes"></pre>
</div><div class="glass p-5 rounded-xl">
<h3>AI API</h3>
<input id="ai" class="w-full p-2 bg-black mt-2 rounded">
<button onclick="run('ai')" class="mt-2 bg-purple-600 px-4 py-2 rounded">Run</button>
<button onclick="copyURL('ai')" class="mt-2 bg-gray-600 px-4 py-2 rounded">Copy URL</button>
<pre id="aiRes"></pre>
</div><div class="glass p-5 rounded-xl">
<h3>Teach API</h3>
<input id="teachQ" class="w-full p-2 bg-black mt-2 rounded" placeholder="question">
<input id="teachA" class="w-full p-2 bg-black mt-2 rounded" placeholder="reply">
<button onclick="run('teach')" class="mt-2 bg-pink-600 px-4 py-2 rounded">Run</button>
<pre id="teachRes"></pre>
</div><div class="glass p-5 rounded-xl">
<h3>Prayer API</h3>
<button onclick="run('prayer')" class="mt-2 bg-green-600 px-4 py-2 rounded">Run</button>
<pre id="prayerRes"></pre>
</div></div><!-- Folder Button --><div class="text-center mt-6">
<button onclick="toggleAPI()" class="bg-yellow-500 px-4 py-2 rounded">📁 All APIs</button>
</div><!-- Hidden API List --><div id="apiFolder" class="hidden max-w-4xl mx-auto mt-4 glass p-4 text-white space-y-2">
<div>simma-chat</div>
<div>simma-ai</div>
<div>simma-teach</div>
<div>simma-listen</div>
<div>simma-list</div>
<div>quiz</div>
<div>tiktok</div>
</div><script>
function apiURL(type){
const chat = document.getElementById('chat').value;
const ai = document.getElementById('ai').value;
const tq = document.getElementById('teachQ')?.value;
const ta = document.getElementById('teachA')?.value;

if(type==='chat') return `https://rakib-api.vercel.app/api/simma-chat?text=${encodeURIComponent(chat)}&apikey=rakib69`;

if(type==='ai') return `https://rakib-api.vercel.app/api/simma-ai?text=${encodeURIComponent(ai)}&apikey=rakib69`;

if(type==='teach') return `https://rakib-api.vercel.app/api/simma-teach?teach=${encodeURIComponent(tq)}&reply=${encodeURIComponent(ta)}&apikey=rakib69`;

if(type==='prayer') return `https://rakib-api.vercel.app/api/prayer`;
}

async function run(type){
try{
const url = apiURL(type);
if(!url) return alert('Invalid');

const res = await fetch(url);
const data = await res.json();

document.getElementById(type+'Res').innerText = JSON.stringify(data,null,2);
}catch(e){
document.getElementById(type+'Res').innerText = 'API Error';
}
}

function copyURL(type){
const url = apiURL(type);
navigator.clipboard.writeText(url);
alert('Copied!');
}

function toggleAPI(){
document.getElementById('apiFolder').classList.toggle('hidden');
}

particlesJS('particles-js', {
particles:{number:{value:80},size:{value:3},move:{speed:2}}
});
</script></body>
</html>
